name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  # ldpred3 is not published yet and bipred consumes an internal compatibility
  # seam. Keep CI reproducible instead of silently following its moving branch.
  LDPRED3_REV: "e0f6171a2635f87d60134b6d76bc8cdb7ab81119"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: ruff (pyflakes)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Linting source files does not require importing or resolving ldpred3.
      - name: Install ruff
        run: pip install "ruff>=0.5"
      - name: Lint (pyflakes-only; see [tool.ruff] in pyproject)
        run: ruff check bipred tests benchmarks

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12", "3.14"]
        numba: ["with-numba", "no-numba"]
    name: py${{ matrix.python-version }} / ${{ matrix.numba }}
    env:
      # Pin BLAS / OMP threads so numeric results are deterministic.
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # bipred depends on ldpred3, which is not on PyPI yet — install it from git
      # so the shared LD / sampler internals are importable.
      - name: Install ldpred3 (dependency, with Numba)
        if: matrix.numba == 'with-numba'
        run: pip install "ldpred3[fast] @ git+https://github.com/bvilhjal/ldpred3.git@${{ env.LDPRED3_REV }}"

      - name: Install ldpred3 (dependency, pure NumPy)
        if: matrix.numba == 'no-numba'
        run: pip install "ldpred3 @ git+https://github.com/bvilhjal/ldpred3.git@${{ env.LDPRED3_REV }}"

      - name: Install bipred (with Numba)
        if: matrix.numba == 'with-numba'
        run: pip install -e ".[test,fast]"

      - name: Install bipred (pure NumPy, no Numba)
        if: matrix.numba == 'no-numba'
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest -q

  windows:
    runs-on: windows-latest
    name: windows / py3.14 / with-numba
    env:
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ldpred3 and bipred with Numba
        run: |
          python -m pip install "ldpred3[fast] @ git+https://github.com/bvilhjal/ldpred3.git@${{ env.LDPRED3_REV }}"
          python -m pip install -e ".[test,fast]"

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-test Windows peak RSS
        run: python -c "import sys; sys.path.insert(0, 'benchmarks'); from _benchmark_utils import peak_rss_bytes; assert peak_rss_bytes() > 0"

  build:
    runs-on: ubuntu-latest
    name: wheel / sdist smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build wheel and sdist
        run: |
          pip install "build>=1.2"
          python -m build

      - name: Check sdist contents
        run: |
          python - <<'PY'
          import glob
          import tarfile

          required = {
              "CHANGELOG.md",
              "LICENSE",
              "README.md",
              "docs/algorithm.md",
              "docs/guide.md",
              "docs/rg.md",
              "benchmarks/README.md",
              "benchmarks/RESULTS.md",
              "benchmarks/_benchmark_utils.py",
              "benchmarks/rg_env_overlap.csv",
          }
          archive, = glob.glob("dist/*.tar.gz")
          with tarfile.open(archive) as tf:
              names = {name.split("/", 1)[1] for name in tf.getnames() if "/" in name}
          missing = required - names
          if missing:
              raise SystemExit(f"sdist is missing: {sorted(missing)}")
          PY

      - name: Build a wheel from the sdist
        run: python -m pip wheel --no-deps dist/*.tar.gz --wheel-dir "${RUNNER_TEMP}/sdist-wheel"

      - name: Install and import the built wheel
        run: |
          pip install "ldpred3 @ git+https://github.com/bvilhjal/ldpred3.git@${{ env.LDPRED3_REV }}"
          pip install dist/*.whl
          cd "${RUNNER_TEMP}"
          python -c "import bipred; print(bipred.__version__)"
